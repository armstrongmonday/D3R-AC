name: D3R·AC CI

# Comprehensive CI workflow for D3R·AC.
#
# Fix notes (this version):
# 1. Every job now checks whether its target directory actually exists
#    before doing real work, and exits cleanly (not as a failure) if not.
#    This matters because code isn't fully pushed yet — jobs shouldn't
#    hard-fail just because contracts/tron, frontend/, or data-pipeline/
#    don't exist in the repo yet.
# 2. Replaced the Gitleaks GitHub Action (which requires a paid license
#    for private repos) with the raw Gitleaks CLI, downloaded directly —
#    this works on public AND private repos with no license needed.
# 3. Removed reliance on paths-filter as the sole gate — directory
#    existence checks act as a second safety net regardless of how the
#    diff is computed, including on a repo's very first commit.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch: {}

jobs:

  # ---------------------------------------------------------------
  # 0. Detect which parts of the repo changed
  # ---------------------------------------------------------------
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      contracts: ${{ steps.filter.outputs.contracts }}
      frontend: ${{ steps.filter.outputs.frontend }}
      data_pipeline: ${{ steps.filter.outputs.data_pipeline }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # On the very first commit to a repo there's no prior commit
          # to diff against; paths-filter falls back sensibly, but we
          # still guard every downstream job with a directory-exists
          # check below as a second safety net.
          filters: |
            contracts:
              - 'contracts/tron/**'
            frontend:
              - 'frontend/**'
            data_pipeline:
              - 'data-pipeline/**'

  # ---------------------------------------------------------------
  # 1. Smart contract compile check (TRON / TVM, Solidity)
  # ---------------------------------------------------------------
  contracts-tron:
    name: Compile TRON Contracts
    needs: changes
    if: needs.changes.outputs.contracts == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check contracts directory exists
        id: check
        run: |
          if [ -d "contracts/tron" ] && [ -n "$(find contracts/tron -name '*.sol' 2>/dev/null)" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::contracts/tron has no .sol files yet — skipping compile step."
          fi

      - name: Set up Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TronBox
        if: steps.check.outputs.exists == 'true'
        run: npm install -g tronbox

      - name: Install local dependencies
        if: steps.check.outputs.exists == 'true'
        working-directory: contracts/tron
        run: npm install

      - name: Compile TRON contracts
        if: steps.check.outputs.exists == 'true'
        working-directory: contracts/tron
        run: tronbox compile

      - name: Upload compiled artifacts
        if: steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tron-build-artifacts
          path: contracts/tron/build/

  # ---------------------------------------------------------------
  # 1b. Contract logic tests (Hardhat) — see contracts/tron/hardhat.config.js
  #     for why Hardhat is used here instead of TronBox: these contracts
  #     use no TRON-specific precompiles/opcodes, so they're exactly as
  #     testable against a standard EVM. This does NOT replace a manual
  #     TronBox/testnet pass before mainnet (see docs/deployment-guide.md).
  # ---------------------------------------------------------------
  contracts-test:
    name: Contract Logic Tests (Hardhat)
    needs: changes
    if: needs.changes.outputs.contracts == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check test suite exists
        id: check
        run: |
          if [ -f "contracts/tron/package.json" ] && [ -d "contracts/tron/test" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::contracts/tron has no test suite yet — skipping."
          fi

      - name: Set up Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        working-directory: contracts/tron
        run: npm install

      - name: Run Hardhat test suite
        if: steps.check.outputs.exists == 'true'
        working-directory: contracts/tron
        run: npx hardhat test

  # ---------------------------------------------------------------
  # 2. Solidity static analysis / linting (security hygiene)
  # ---------------------------------------------------------------
  contracts-lint:
    name: Lint & Static Analysis (Solidity)
    needs: [ changes, contracts-tron ]
    if: |
      always() &&
      needs.changes.outputs.contracts == 'true' &&
      needs.contracts-tron.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check contracts directory exists
        id: check
        run: |
          if [ -d "contracts/tron" ] && [ -n "$(find contracts/tron -name '*.sol' 2>/dev/null)" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install solhint
        if: steps.check.outputs.exists == 'true'
        run: npm install -g solhint

      - name: Run solhint
        if: steps.check.outputs.exists == 'true'
        working-directory: contracts/tron
        run: solhint 'contracts/**/*.sol' || true

  # ---------------------------------------------------------------
  # 3. Frontend build & test (community access layer)
  # ---------------------------------------------------------------
  frontend:
    name: Frontend Build & Test
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check frontend directory exists
        id: check
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::frontend/package.json not found yet — skipping frontend build."
          fi

      - name: Set up Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm ci

      - name: Run lint
        if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm run lint --if-present

      - name: Run tests
        if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm test --if-present

      - name: Build production bundle
        if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm run build

      - name: Upload build artifacts
        if: steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

  # ---------------------------------------------------------------
  # 4. Data pipeline checks (risk-scoring R(c,t) implementation)
  # ---------------------------------------------------------------
  data-pipeline:
    name: Data Pipeline Tests
    needs: changes
    if: needs.changes.outputs.data_pipeline == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check data-pipeline directory exists
        id: check
        run: |
          if [ -d "data-pipeline" ] && [ -n "$(find data-pipeline -name '*.py' 2>/dev/null)" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::data-pipeline has no Python files yet — skipping."
          fi

      - name: Set up Python
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: data-pipeline/requirements.txt

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        working-directory: data-pipeline
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        if: steps.check.outputs.exists == 'true'
        working-directory: data-pipeline
        run: |
          if [ -d tests ]; then pytest tests/; else echo "No tests directory yet — skipping."; fi

  # ---------------------------------------------------------------
  # 5. Secret scanning — raw Gitleaks CLI (no license required)
  #    (non-blocking for initial test runs)
  # ---------------------------------------------------------------
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download and run Gitleaks CLI (non-blocking)
        run: |
          GITLEAKS_VERSION="8.18.4"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          ./gitleaks detect --source . --verbose --redact || true
        # Runs the open-source CLI directly — free regardless of repo
        # visibility, no GitHub Marketplace Action license needed.

  # ---------------------------------------------------------------
  # 6. Summary job — single required status check for branch protection
  # ---------------------------------------------------------------
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [ changes, contracts-tron, contracts-test, contracts-lint, frontend, data-pipeline, secret-scan ]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "Contracts changed:  ${{ needs.changes.outputs.contracts }}"
          echo "Contracts (TRON):   ${{ needs.contracts-tron.result }}"
          echo "Contracts tests:    ${{ needs.contracts-test.result }}"
          echo "Contracts lint:     ${{ needs.contracts-lint.result }}"
          echo "Frontend changed:   ${{ needs.changes.outputs.frontend }}"
          echo "Frontend:           ${{ needs.frontend.result }}"
          echo "Data pipeline:      ${{ needs.data-pipeline.result }}"
          echo "Secret scan:        ${{ needs.secret-scan.result }}"

          if [[ "${{ needs.contracts-tron.result }}" == "failure" ]] || \
             [[ "${{ needs.contracts-test.result }}" == "failure" ]] || \
             [[ "${{ needs.contracts-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend.result }}" == "failure" ]] || \
             [[ "${{ needs.data-pipeline.result }}" == "failure" ]] || \
             [[ "${{ needs.secret-scan.result }}" == "failure" ]]; then
            echo "One or more jobs failed."
            exit 1
          fi
