name: D3R·AC CI

# Comprehensive CI workflow for D3R·AC.
# Uses dorny/paths-filter to reliably detect which parts of the repo
# changed, across the full push (not just the last commit) and correctly
# on pull_request events too.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch: {}   # allows manual trigger from the Actions tab

jobs:

  # ---------------------------------------------------------------
  # 0. Detect which parts of the repo changed
  # ---------------------------------------------------------------
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      contracts: ${{ steps.filter.outputs.contracts }}
      frontend: ${{ steps.filter.outputs.frontend }}
      data_pipeline: ${{ steps.filter.outputs.data_pipeline }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            contracts:
              - 'contracts/tron/**'
            frontend:
              - 'frontend/**'
            data_pipeline:
              - 'data-pipeline/**'

  # ---------------------------------------------------------------
  # 1. Smart contract compile check (TRON / TVM, Solidity)
  # ---------------------------------------------------------------
  contracts-tron:
    name: Compile TRON Contracts
    needs: changes
    if: needs.changes.outputs.contracts == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TronBox
        run: npm install -g tronbox

      - name: Compile TRON contracts
        working-directory: contracts/tron
        run: tronbox compile

      - name: Upload compiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tron-build-artifacts
          path: contracts/tron/build/

  # ---------------------------------------------------------------
  # 2. Solidity static analysis / linting (security hygiene)
  # ---------------------------------------------------------------
  contracts-lint:
    name: Lint & Static Analysis (Solidity)
    needs: [ changes, contracts-tron ]
    if: |
      always() &&
      needs.changes.outputs.contracts == 'true' &&
      needs.contracts-tron.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install solhint
        run: npm install -g solhint

      - name: Run solhint
        working-directory: contracts/tron
        run: solhint '**/*.sol' || true
        # `|| true` keeps this non-blocking for now (warnings only).
        # Remove once the contract is lint-clean and you want new
        # warnings to fail the build.

  # ---------------------------------------------------------------
  # 3. Frontend build & test (community access layer)
  # ---------------------------------------------------------------
  frontend:
    name: Frontend Build & Test
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

  # ---------------------------------------------------------------
  # 4. Data pipeline checks (risk-scoring R(c,t) implementation)
  # ---------------------------------------------------------------
  data-pipeline:
    name: Data Pipeline Tests
    needs: changes
    if: needs.changes.outputs.data_pipeline == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./data-pipeline
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: data-pipeline/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          if [ -d tests ]; then pytest tests/; else echo "No tests directory yet — skipping."; fi

  # ---------------------------------------------------------------
  # 5. Secret scanning (always runs — protects the whole repo)
  # ---------------------------------------------------------------
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Flags anything that looks like a private key, API token, or
        # wallet secret before it can be merged. Runs on every push/PR
        # regardless of which paths changed, since a leaked secret
        # anywhere in the repo matters. Free for public repos.

  # ---------------------------------------------------------------
  # 6. Summary job — single required status check for branch protection
  # ---------------------------------------------------------------
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [ changes, contracts-tron, contracts-lint, frontend, data-pipeline, secret-scan ]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "Contracts changed:  ${{ needs.changes.outputs.contracts }}"
          echo "Contracts (TRON):   ${{ needs.contracts-tron.result }}"
          echo "Contracts lint:     ${{ needs.contracts-lint.result }}"
          echo "Frontend changed:   ${{ needs.changes.outputs.frontend }}"
          echo "Frontend:           ${{ needs.frontend.result }}"
          echo "Data pipeline:      ${{ needs.data-pipeline.result }}"
          echo "Secret scan:        ${{ needs.secret-scan.result }}"

          # Fail the summary (and therefore any required check) if any
          # job that actually ran did not succeed.
          if [[ "${{ needs.contracts-tron.result }}" == "failure" ]] || \
             [[ "${{ needs.contracts-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend.result }}" == "failure" ]] || \
             [[ "${{ needs.data-pipeline.result }}" == "failure" ]] || \
             [[ "${{ needs.secret-scan.result }}" == "failure" ]]; then
            echo "One or more jobs failed."
            exit 1
          fi