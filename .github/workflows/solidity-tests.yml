name: D3R·AC CI

# Comprehensive CI workflow for D3R·AC.
# Runs relevant jobs only when files in their respective directories change,
# keeping runs fast and avoiding unnecessary builds.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch: {}   # allows manual trigger from the Actions tab

jobs:

  # ---------------------------------------------------------------
  # 1. Smart contract compile check (TRON / TVM, Solidity)
  # ---------------------------------------------------------------
  contracts-tron:
    name: Compile TRON Contracts
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'contracts/tron') ||
      contains(github.event.head_commit.added, 'contracts/tron') ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TronBox
        run: npm install -g tronbox

      - name: Compile TRON contracts
        working-directory: contracts/tron
        run: tronbox compile

      - name: Upload compiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tron-build-artifacts
          path: contracts/tron/build/

  # ---------------------------------------------------------------
  # 2. Solidity static analysis / linting (security hygiene)
  # ---------------------------------------------------------------
  contracts-lint:
    name: Lint & Static Analysis (Solidity)
    runs-on: ubuntu-latest
    needs: contracts-tron
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install solhint
        run: npm install -g solhint

      - name: Run solhint
        working-directory: contracts/tron
        run: solhint '**/*.sol' || true
        # `|| true` keeps this job non-blocking for now (warnings only).
        # Remove once the contract is fully lint-clean and you want
        # this to fail the build on new warnings.

  # ---------------------------------------------------------------
  # 3. Frontend build & test (community access layer)
  # ---------------------------------------------------------------
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

  # ---------------------------------------------------------------
  # 4. Data pipeline checks (risk-scoring R(c,t) implementation)
  # ---------------------------------------------------------------
  data-pipeline:
    name: Data Pipeline Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./data-pipeline
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: data-pipeline/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          if [ -d tests ]; then pytest tests/; else echo "No tests directory yet — skipping."; fi

  # ---------------------------------------------------------------
  # 5. Secret scanning (protects against accidentally committed keys)
  # ---------------------------------------------------------------
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Flags anything that looks like a private key, API token, or
        # wallet secret before it can be merged. Critical for a repo
        # touching TRON/Casper wallet interactions.

  # ---------------------------------------------------------------
  # 6. Summary job — useful as a single required status check
  # ---------------------------------------------------------------
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [ contracts-tron, contracts-lint, frontend, data-pipeline, secret-scan ]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "Contracts (TRON):   ${{ needs.contracts-tron.result }}"
          echo "Contracts lint:     ${{ needs.contracts-lint.result }}"
          echo "Frontend:           ${{ needs.frontend.result }}"
          echo "Data pipeline:      ${{ needs.data-pipeline.result }}"
          echo "Secret scan:        ${{ needs.secret-scan.result }}"